name: "Incra API Server Plan"

on:
  pull_request:
    paths:
      - incra_api_server/terraform/**

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions
          aws-region: ap-northeast-1

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: incra_api_server/terraform

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: incra_api_server/terraform

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: incra_api_server/terraform

      - name: Terraform Plan
        id: plan
        env:
          QUEUE_URL: ${{ secrets.QUEUE_URL }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
        run: |
          : > plan_raw.txt
          terraform plan -no-color \
            -var "queue_url=${QUEUE_URL}" \
            -var "slack_token=${SLACK_TOKEN}" \
            | tee -a plan_raw.txt
        working-directory: incra_api_server/terraform

      - name: Reformat Plan
        if: success() || failure()
        working-directory: incra_api_server/terraform
        run: |
          sed -E 's/^([[:space:]]+)([-+])/\2\1/g' plan_raw.txt > plan.txt

      - name: Put Plan in Env Var
        if: success() || failure()
        working-directory: incra_api_server/terraform
        run: |
          PLAN=$(cat plan.txt)
          echo "PLAN<<EOF" >> $GITHUB_ENV
          echo "$PLAN" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Read Plan and Post Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Terraform Format');
            });

            const output = `#### Terraform Format 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`diff
            ${{ env.PLAN }}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Working Directory: \`incra_api_server/terraform\``;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output,
              });
            }
