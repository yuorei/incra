name: "Infra Terraform Plan"

on:
  pull_request:
    paths:
      - infra/**

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions
          aws-region: ap-northeast-1

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: infra/environments/prod

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: infra/environments/prod

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: infra/environments/prod

      - name: Terraform Plan
        id: plan
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CLIENT_ID: ${{ secrets.SLACK_CLIENT_ID }}
          SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          WEB_BASE_URL: ${{ secrets.WEB_BASE_URL }}
          FONT_NAME: ${{ secrets.FONT_NAME }}
          FONT_PATH: ${{ secrets.FONT_PATH }}
        run: |
          : > plan_raw.txt
          terraform plan -no-color \
            -var "slack_token=${SLACK_TOKEN}" \
            -var "slack_client_id=${SLACK_CLIENT_ID}" \
            -var "slack_client_secret=${SLACK_CLIENT_SECRET}" \
            -var "session_secret=${SESSION_SECRET}" \
            -var "web_base_url=${WEB_BASE_URL}" \
            -var "font_name=${FONT_NAME}" \
            -var "font_path=${FONT_PATH}" \
            | tee -a plan_raw.txt
        working-directory: infra/environments/prod

      - name: Reformat Plan
        if: success() || failure()
        working-directory: infra/environments/prod
        run: |
          sed -E 's/^([[:space:]]+)([-+])/\2\1/g' plan_raw.txt > plan.txt

      - name: Put Plan in Env Var
        if: success() || failure()
        working-directory: infra/environments/prod
        run: |
          PLAN=$(cat plan.txt)
          echo "PLAN<<EOF" >> $GITHUB_ENV
          echo "$PLAN" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Read Plan and Post Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Terraform Format');
            });

            const output = `#### Terraform Format 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`diff
            ${{ env.PLAN }}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Working Directory: \`infra/environments/prod\``;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output,
              });
            }
