name: "Infra Terraform Plan"

on:
  pull_request:
    paths:
      - infra/**

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Go Lambda ビルド ---
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: incra_api_server/go.mod

      - name: Generate OpenAPI code
        working-directory: incra_api_server
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest
          make gen

      - name: Build API Server Lambda
        working-directory: incra_api_server
        run: |
          GOOS=linux GOARCH=amd64 go build -tags lambda.norpc -o bootstrap main.go
          zip bootstrap.zip bootstrap
          rm bootstrap

      - name: Build Reminder Lambda
        working-directory: incra_api_server
        run: |
          GOOS=linux GOARCH=amd64 go build -tags lambda.norpc -o bootstrap ./cmd/reminder/main.go
          zip reminder.zip bootstrap
          rm bootstrap

      # --- Python Lambda ビルド ---
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --platform manylinux2014_x86_64 --only-binary=:all: --implementation cp --target pdf_generate/src -r pdf_generate/src/requirements.txt

      - name: Zip Python Lambda
        working-directory: pdf_generate/src
        run: zip -r ../../python_lambda.zip .

      # --- Lambda zip を配置 ---
      - name: Create lambda output directory
        run: mkdir -p infra/environments/prod/lambda

      - name: Move Lambda zips
        run: |
          mv incra_api_server/bootstrap.zip infra/environments/prod/lambda/
          mv incra_api_server/reminder.zip infra/environments/prod/lambda/
          mv python_lambda.zip infra/environments/prod/lambda/python_lambda.zip

      # --- Terraform ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions
          aws-region: ap-northeast-1

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check -recursive .
        working-directory: infra

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: infra/environments/prod

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: infra/environments/prod

      - name: Terraform Plan
        id: plan
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CLIENT_ID: ${{ secrets.SLACK_CLIENT_ID }}
          SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          WEB_BASE_URL: ${{ secrets.WEB_BASE_URL }}
          FONT_NAME: ${{ secrets.FONT_NAME }}
          FONT_PATH: ${{ secrets.FONT_PATH }}
        run: |
          : > plan_raw.txt
          terraform plan -no-color \
            -var "slack_token=${SLACK_TOKEN}" \
            -var "slack_client_id=${SLACK_CLIENT_ID}" \
            -var "slack_client_secret=${SLACK_CLIENT_SECRET}" \
            -var "session_secret=${SESSION_SECRET}" \
            -var "web_base_url=${WEB_BASE_URL}" \
            -var "font_name=${FONT_NAME}" \
            -var "font_path=${FONT_PATH}" \
            | tee -a plan_raw.txt
        working-directory: infra/environments/prod

      - name: Reformat Plan
        if: success() || failure()
        working-directory: infra/environments/prod
        run: |
          sed -E 's/^([[:space:]]+)([-+])/\2\1/g' plan_raw.txt > plan.txt

      - name: Put Plan in Env Var
        if: success() || failure()
        working-directory: infra/environments/prod
        run: |
          PLAN=$(cat plan.txt)
          echo "PLAN<<EOF" >> $GITHUB_ENV
          echo "$PLAN" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Read Plan and Post Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('<!-- tf-plan -->');
            });

            const output = `<!-- tf-plan -->
            #### Terraform Format 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`diff
            ${{ env.PLAN }}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Working Directory: \`infra/environments/prod\``;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output,
              });
            }
