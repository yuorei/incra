name: "PDF Generate Plan"

on:
  pull_request:
    paths:
      - pdf_generate/terraform/**

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write
jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python のセットアップと依存関係のインストール
      - name: Setup Python and Install Dependencies
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: |
          python -m pip install --upgrade pip
          pip install --platform manylinux2014_x86_64 --only-binary=:all: --implementation cp --target pdf_generate/src -r pdf_generate/src/requirements.txt

      # 出力先のディレクトリを作成
      - name: Create lambda output directory
        run: mkdir -p pdf_generate/terraform/lambda

      # src ディレクトリの内容を ZIP 圧縮して配置します。
      - name: Zip src directory
        run: |
          zip -r pdf_generate/terraform/lambda/python_lambda.zip pdf_generate/src

      # Terraformのセットアップ
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check files
        run: ls -la pdf_generate/terraform

      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions
          aws-region: ap-northeast-1

      # Terraform Formatの確認
      - name: Terraform Format
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: pdf_generate/terraform

      # Terraform Initの実行
      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: pdf_generate/terraform

      # Terraform Validateの実行
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: pdf_generate/terraform

      # Terraform Planの実行
      - name: Plan Terraform
        id: plan
        env:
          FONT_NAME: ${{ secrets.FONT_NAME }}
          FONT_PATH: ${{ secrets.FONT_PATH }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_REGION_NAME: ${{ secrets.R2_REGION_NAME }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          : > plan_raw.txt
          terraform plan -no-color \
            -var "font_name=${FONT_NAME}" \
            -var "font_path=${FONT_PATH}" \
            -var "r2_endpoint_url=${R2_ENDPOINT_URL}" \
            -var "r2_access_key_id=${R2_ACCESS_KEY_ID}" \
            -var "r2_secret_access_key=${R2_SECRET_ACCESS_KEY}" \
            -var "region_name=${R2_REGION_NAME}" \
            -var "bucket_name=${BUCKET_NAME}" \
            -var "aws_account_id=${AWS_ACCOUNT_ID}" \
            | tee -a plan_raw.txt
        working-directory: pdf_generate/terraform
      # Planの結果を整形してハイライト可能なdiff形式に変換
      - name: Reformat Plan
        if: success() || failure()
        working-directory: pdf_generate/terraform
        run: |
          sed -E 's/^([[:space:]]+)([-+])/\2\1/g' plan_raw.txt > plan.txt

      # Planの内容を環境変数に入れる
      - name: Put Plan in Env Var
        if: success() || failure()
        working-directory: pdf_generate/terraform
        run: |
          PLAN=$(cat plan.txt)
          echo "PLAN<<EOF" >> $GITHUB_ENV
          echo "$PLAN" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
      # PRコメントにPlanの結果を投稿
      - name: Read Plan and Post Comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // 1. Retrieve existing bot comments for the PR
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Terraform Format')
            })

            // 2. Prepare format of the comment
            const output = `#### Terraform Format 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            <details><summary>Validation Output</summary>

            \`\`\`terraform
            ${{ steps.validate.outputs.stdout }}
            \`\`\`

            </details>

            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`diff
            ${{ env.PLAN }}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Working Directory: \`pdf_generate/terraform\``;

            // 3. If we have a comment, update it, otherwise create a new one
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              })
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              })
            }
